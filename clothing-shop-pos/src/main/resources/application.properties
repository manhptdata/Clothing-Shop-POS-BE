spring.application.name=clothing-shop-pos

spring.profiles.include=secret

# Database Configuration

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://clothing-shop-db:3306/clothing_shop_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Tắt tự động ALTER TABLE trên Production để tránh treo Metadata Lock
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Khai báo Dialect cứng để không bị crash khi DB khởi động chậm
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Quản lý Connection Pool (HikariPool) chống cạn kiệt Connection
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JWT Configuration
sapo.jwt.access-token-validity-in-seconds=86400
sapo.jwt.refresh-token-validity-in-seconds=604800

# Pageable
spring.data.web.pageable.default-page-size=5
spring.data.web.pageable.one-indexed-parameters=true
spring.data.web.pageable.page-parameter=page
spring.data.web.pageable.size-parameter=size
spring.data.web.sort.sort-parameter=sort

# Jackson
spring.jackson.deserialization.fail-on-unknown-properties=false

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:manhwakunchi@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:wmezdfmiesmijaad}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# AI Gemini API (Mapping from Environment Variables)
ai.gemini.api-key=${AI_GEMINI_API_KEY:}
ai.gemini.api-url=${AI_GEMINI_API_URL:}

# Prometheus / Actuator
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=clothing-shop-be

# AI Recommendation (Apriori)
ai.recommendation.min-support=0.02
ai.recommendation.min-confidence=0.3
ai.recommendation.min-lift=1.0
ai.recommendation.data-months=6
ai.recommendation.cron=0 0 2 * * ?

# SePay Webhook Authorization Token
sepay.webhook.token=${SEPAY_WEBHOOK_TOKEN:MySuperSecretToken123}

management.endpoint.health.show-details=always